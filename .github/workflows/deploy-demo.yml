name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual deployment

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build:package

      - name: Build demo for GitHub Pages
        run: npm run build --workspace=examples/demo
        env:
          # GitHub Pages will be served at https://inappai.github.io/react/
          VITE_BASE_PATH: /react/
          # Use production InAppAI API
          VITE_SUBSCRIPTION_ID: 1SRQirDl8ZSL5WM3prQ5y1pz
          VITE_API_BASE_URL: https://inapp-ai-dev.web.app/api

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the demo build output
          path: 'examples/demo/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
